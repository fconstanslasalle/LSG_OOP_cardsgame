<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Java Edition - Generador de Cartes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');

        :root {
            --card-width: 6.3cm;
            --card-height: 8.8cm;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Estils Base de la Carta */
        .mtg-card {
            width: 256px;
            height: 360px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: default;
            box-sizing: border-box;
            background-color: #0f172a;
        }

        .card-front:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        /* Estils Revers */
        .card-back {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border: 8px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .logo-la-salle {
            filter: brightness(0) invert(1);
            width: 70%;
            opacity: 0.9;
        }

        /* Colors segons tipus */
        .card-class { border-color: #4c1d95; color: #f5f3ff; }
        .card-constructor { border-color: #064e3b; color: #ecfdf5; }
        .card-method { border-color: #7c2d12; color: #fff7ed; }

        .header-class { background-color: rgba(76, 29, 149, 0.6); }
        .header-constructor { background-color: rgba(6, 78, 59, 0.6); }
        .header-method { background-color: rgba(154, 52, 18, 0.6); }

        /* Art Icon Size */
        .art-icon svg { width: 64px !important; height: 64px !important; }

        /* Layout d'impressió */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            
            .print-page {
                display: grid !important;
                grid-template-columns: repeat(3, var(--card-width)) !important;
                grid-template-rows: repeat(3, var(--card-height)) !important;
                justify-content: center;
                align-content: center;
                width: 210mm;
                height: 297mm;
                page-break-after: always;
                overflow: hidden;
            }

            .mtg-card {
                width: var(--card-width) !important;
                height: var(--card-height) !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-width: 6px !important;
                display: flex !important;
            }
            
            /* En el revers, invertim l'ordre de les columnes per alineació perfecta al girar horitzontalment */
            .print-page.back-page {
                direction: rtl; 
            }

            @page { size: A4; margin: 0; }
        }

        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Modal Esborrar -->
    <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm modal-enter">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 text-center">
            <div class="mx-auto flex items-center justify-center w-16 h-16 rounded-full bg-red-100 text-red-600 mb-4">
                <i data-lucide="alert-triangle"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">Esborrar tot?</h3>
            <p class="text-slate-600 mb-6">Es perdran totes les cartes actuals.</p>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition">Cancel·lar</button>
                <button onclick="confirmClear()" class="flex-1 py-3 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 transition">Sí, esborra</button>
            </div>
        </div>
    </div>

    <!-- UI Header -->
    <div class="max-w-6xl mx-auto mb-10 no-print">
        <header class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200">
                        <i data-lucide="cpu" class="text-white" size="28"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Java <span class="text-emerald-600 italic">Deck</span></h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Automatic 2-Side Printing System</p>
                    </div>
                </div>

                <div class="flex gap-3">
                    <label class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-black cursor-pointer transition shadow-lg flex items-center gap-2 uppercase text-xs">
                        <i data-lucide="plus-square" size="18"></i> Importar CSV
                        <input type="file" id="csvInput" accept=".csv" class="hidden">
                    </label>
                    
                    <button id="printBtn" onclick="handlePrint()" disabled class="bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-2xl font-black transition shadow-lg flex items-center gap-2 uppercase text-xs">
                        <i data-lucide="printer" size="18"></i> Imprimir a 2 Cares
                    </button>

                    <button id="clearBtn" onclick="openModal()" disabled class="p-3 text-red-400 hover:text-red-600 transition">
                        <i data-lucide="trash-2" size="24"></i>
                    </button>
                </div>
            </div>

            <div id="filterSection" class="hidden flex items-center gap-3 mt-8 pt-6 border-t border-slate-100">
                <button onclick="setFilter('all')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black bg-slate-900 text-white shadow-md" data-filter="all">TOTES</button>
                <button onclick="setFilter('class')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black bg-slate-100 text-slate-500" data-filter="class">CLASSES</button>
                <button onclick="setFilter('constructor')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black bg-slate-100 text-slate-500" data-filter="constructor">CONSTRUCTORS</button>
                <button onclick="setFilter('method')" class="filter-btn px-5 py-2 rounded-xl text-xs font-black bg-slate-100 text-slate-500" data-filter="method">MÈTODES</button>
                <div class="ml-auto text-[11px] font-black text-emerald-600 uppercase tracking-tighter">Deck: <span id="counter">0</span> cartes</div>
            </div>
        </header>
    </div>

    <!-- Main Grid / Print Layout -->
    <div id="mainContainer" class="max-w-6xl mx-auto">
        <!-- Estat buit -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-40 border-4 border-dashed border-slate-200 rounded-[3.5rem] bg-white/50 text-slate-300 no-print">
            <i data-lucide="file-code" size="64" class="mb-4 opacity-10"></i>
            <p class="text-2xl font-black uppercase tracking-tight opacity-40">Importa els CSV per començar</p>
        </div>

        <!-- Grid per pantalla -->
        <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 justify-items-center no-print mb-20"></div>

        <!-- Contenidor invisible per a impressió (generat dinàmicament) -->
        <div id="printArea" class="hidden print:block"></div>
    </div>

    <script>
        let allCards = [];
        let currentFilter = 'all';

        lucide.createIcons();

        const csvInput = document.getElementById('csvInput');
        csvInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const newCards = parseCSV(event.target.result);
                if (newCards.length > 0) {
                    allCards = [...allCards, ...newCards];
                    updateUI();
                }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        });

        function parseCSV(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const parsed = [];
            lines.forEach(line => {
                const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                const type = cols[0].toLowerCase();
                if (type === 'class') parsed.push({ tipus: 'class', nom: cols[1], desc: cols[2], vida: parseInt(cols[6]?.match(/\d+/)) || 0, forca: parseInt(cols[7]?.match(/\d+/)) || 0, m1: cols[8], m2: cols[9], esp: cols[10] });
                else if (type === 'constructor' || type === 'method') parsed.push({ tipus: type, nom: cols[1], classRef: cols[2], desc: cols[3], codi: cols[4], ram: cols[5] });
            });
            return parsed;
        }

        function updateUI() {
            const hasCards = allCards.length > 0;
            document.getElementById('emptyState').style.display = hasCards ? 'none' : 'flex';
            document.getElementById('filterSection').classList.toggle('hidden', !hasCards);
            document.getElementById('printBtn').disabled = !hasCards;
            document.getElementById('clearBtn').disabled = !hasCards;
            renderView();
        }

        function renderView() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            const filtered = allCards.filter(c => currentFilter === 'all' || c.tipus === currentFilter);
            document.getElementById('counter').innerText = filtered.length;
            
            filtered.forEach(data => {
                grid.appendChild(createCardElement(data));
            });
            lucide.createIcons();
        }

        function createCardElement(data, isBack = false) {
            const div = document.createElement('div');
            if (isBack) {
                div.className = "mtg-card card-back rounded-xl p-4";
                div.innerHTML = `
                    <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#fff 0.5px, transparent 0.5px); background-size: 15px 15px;"></div>
                    <img src="https://gracia.lasalle.cat/storage/2022/12/logo.svg" class="logo-la-salle mb-8">
                    <div class="text-white/40 font-black text-[9px] tracking-[0.4em] uppercase border-t border-white/10 pt-6">Java Edition Deck</div>
                `;
            } else {
                const isClass = data.tipus === 'class';
                const theme = isClass ? 'card-class' : (data.tipus === 'constructor' ? 'card-constructor' : 'card-method');
                const header = isClass ? 'header-class' : (data.tipus === 'constructor' ? 'header-constructor' : 'header-method');
                const icon = isClass ? 'settings' : (data.tipus === 'constructor' ? 'zap' : 'code');
                div.className = `mtg-card card-front rounded-xl border-8 p-1 flex flex-col ${theme}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center p-1 rounded-t px-2 mb-1 ${header} border-b border-white/20">
                        <span class="font-black text-[12px] truncate uppercase tracking-tighter">${data.nom}</span>
                        <div class="flex items-center gap-1.5 bg-black/50 px-2 py-1 rounded-full border border-white/20">
                            <span class="text-[12px] font-black">${isClass ? 'CORE' : (data.ram || 0)}</span>
                            <i data-lucide="cpu" size="14" class="text-blue-400"></i>
                        </div>
                    </div>
                    <div class="w-full h-24 bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center border border-black relative shrink-0">
                        <div class="art-icon z-10 opacity-70"><i data-lucide="${icon}"></i></div>
                    </div>
                    <div class="mx-1 mt-1 px-2 py-1 border border-black italic text-[11px] ${header} font-black uppercase tracking-tight">
                        ${isClass ? "Class Definition — Object" : data.tipus + " — " + (data.classRef || "Global")}
                    </div>
                    <div class="flex-grow mx-1 my-1 p-2 bg-slate-100 text-slate-900 rounded-sm border border-black text-[10px] flex flex-col relative overflow-hidden">
                        <p class="italic mb-2 text-slate-600 border-b pb-1 font-bold text-[9px] text-left">${data.desc}</p>
                        ${!isClass ? `<div class="text-left font-mono bg-slate-900 text-blue-300 p-2 rounded shadow-inner text-[10px] whitespace-pre-wrap overflow-hidden flex-grow border-l-4 border-l-blue-500">${data.codi}</div>` : `
                            <div class="space-y-1.5 pt-1 text-left flex-grow overflow-hidden">
                                <div class="flex items-center gap-1.5 font-black text-slate-800 text-[7.5px] uppercase whitespace-nowrap"><i data-lucide="zap" size="12" class="text-emerald-700 shrink-0"></i><span class="">${data.m1}</span></div>
                                <div class="flex items-center gap-1.5 font-black text-slate-800 text-[7.5px] uppercase whitespace-nowrap"><i data-lucide="shield" size="12" class="text-blue-700 shrink-0"></i><span class="">${data.m2}</span></div>
                                <div class="flex items-center gap-1.5 font-black text-slate-800 text-[7.5px] uppercase whitespace-nowrap pr-10"><i data-lucide="code" size="12" class="text-orange-700 shrink-0"></i><span class="">${data.esp}</span></div>
                            </div>
                        `}
                    </div>
                    ${isClass ? `<div class="absolute bottom-1.5 right-1.5 bg-white border-2 border-slate-900 px-2 py-0.5 rounded-md font-black flex items-center gap-1 text-[10px] shadow-md z-20"><div class="flex items-center text-red-600"><i data-lucide="heart" size="12" class="mr-1"></i>${data.vida}</div><div class="w-[1px] h-2.5 bg-slate-300 mx-0.5"></div><div class="flex items-center text-blue-600"><i data-lucide="zap" size="12" class="mr-1"></i>${data.forca}</div></div>` : ''}
                    <div class="text-[5px] text-center mb-0.5 opacity-40 uppercase tracking-[0.3em] font-black">OOP JAVA - CARDS GAME © 2026</div>
                `;
            }
            return div;
        }

        function preparePrintArea() {
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            const filtered = allCards.filter(c => currentFilter === 'all' || c.tipus === currentFilter);
            
            // Agrupem en pàgines de 9
            for (let i = 0; i < filtered.length; i += 9) {
                const chunk = filtered.slice(i, i + 9);
                
                // Full d'Anversos
                const frontPage = document.createElement('div');
                frontPage.className = 'print-page';
                chunk.forEach(data => frontPage.appendChild(createCardElement(data)));
                printArea.appendChild(frontPage);

                // Full de Reversos
                const backPage = document.createElement('div');
                backPage.className = 'print-page back-page';
                chunk.forEach(() => backPage.appendChild(createCardElement(null, true)));
                printArea.appendChild(backPage);
            }
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => {
                const active = b.dataset.filter === f;
                b.className = `filter-btn px-5 py-2 rounded-xl text-xs font-black transition-all ${active ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`;
            });
            renderView();
        }

        function handlePrint() {
            preparePrintArea();
            lucide.createIcons();
            setTimeout(() => {
                window.focus();
                window.print();
            }, 500);
        }

        function openModal() { document.getElementById('deleteModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('deleteModal').classList.add('hidden'); }
        function confirmClear() { allCards = []; updateUI(); closeModal(); }
    </script>
</body>
</html>
